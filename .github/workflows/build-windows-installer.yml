name: build-windows-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "安装包版本号（不含 v 前缀），留空则用 0.0.0-dev"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: 解析版本号
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
            version="${version:-0.0.0-dev}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress -y

      - name: 编译安装包
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} packaging\windows\doyoutrade-setup.iss

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: DoYouTrade-Setup
          path: packaging/windows/dist/DoYouTrade-Setup.exe

      - name: 发布到 Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: packaging/windows/dist/DoYouTrade-Setup.exe
