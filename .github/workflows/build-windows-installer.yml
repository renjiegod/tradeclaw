name: build-windows-installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "安装包版本号（不含 v 前缀），留空则用 0.0.0-dev"
        required: false

permissions:
  contents: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          test -f dist/index.html

      - name: Build wheel (frontend required)
        env:
          DOYOUTRADE_REQUIRE_FRONTEND: "1"
        run: |
          uv build
          wheel="$(ls -1 dist/doyoutrade-*-py3-none-any.whl | head -n1)"
          # GITHUB_ENV only applies to *subsequent* steps; export for this step's verify.
          export WHEEL="$wheel"
          echo "WHEEL=$wheel" >> "$GITHUB_ENV"
          echo "Built $wheel"
          python - <<'PY'
          import os, sys, zipfile
          from pathlib import Path
          wheel = Path(os.environ["WHEEL"])
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
          marker = "doyoutrade/_frontend/index.html"
          if marker not in names:
              sys.exit(f"FATAL: {wheel.name} missing {marker} ({len(names)} entries)")
          print(f"OK: {wheel.name} contains {marker}")
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: doyoutrade-wheel
          path: dist/doyoutrade-*-py3-none-any.whl
          if-no-files-found: error

  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer encoding / launcher regression tests
        shell: bash
        run: |
          python -m unittest \
            tests.test_installer_no_bom \
            tests.test_install_win_bootstrap \
            tests.test_windows_launcher_bat \
            tests.test_windows_installer_hardening \
            tests.test_install_console_diagnostics \
            tests.test_windows_installer_python_pin \
            tests.test_install_release_wheel \
            tests.test_release_wheel \
            -v

      - name: 解析版本号
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ github.event.inputs.version }}"
            version="${version:-0.0.0-dev}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress -y

      - name: 编译安装包
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} packaging\windows\doyoutrade-setup.iss

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: DoYouTrade-Setup
          path: packaging/windows/dist/DoYouTrade-Setup.exe
          if-no-files-found: error

  publish:
    needs: [build-wheel, build-installer]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download wheel
        uses: actions/download-artifact@v7
        with:
          name: doyoutrade-wheel
          path: dist

      - name: Download Setup.exe
        uses: actions/download-artifact@v7
        with:
          name: DoYouTrade-Setup
          path: packaging/windows/dist

      - name: List release assets
        run: |
          ls -la dist/
          ls -la packaging/windows/dist/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/doyoutrade-*-py3-none-any.whl
            packaging/windows/dist/DoYouTrade-Setup.exe

      - name: Sync Release assets to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "${GITEE_TOKEN}" ]; then
            echo "FATAL: GITEE_TOKEN secret is required to mirror Release wheels to Gitee."
            echo "Add a Gitee personal access token (projects + release attach) as repo secret GITEE_TOKEN."
            exit 1
          fi
          tag="${GITHUB_REF_NAME}"
          wheel="$(ls -1 dist/doyoutrade-*-py3-none-any.whl | head -n1)"
          setup="packaging/windows/dist/DoYouTrade-Setup.exe"
          python scripts/sync_gitee_release.py \
            --tag "$tag" \
            --name "$tag" \
            --body "DoYouTrade $tag — prebuilt wheel (web UI bundled) + Windows Setup.exe" \
            --asset "$wheel" \
            --asset "$setup"
