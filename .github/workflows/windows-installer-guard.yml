# Guard the Windows install path: encoding contracts + Inno dry-compile.
#
# Catches the failure modes that shipped broken v0.1.2 / empty Setup.exe:
#   - install.ps1 gains a UTF-8 BOM (breaks irm|iex)
#   - install-win.ps1 stops being pure ASCII (breaks PS 5.1 -File on CP936)
#   - launcher .bat files regress to UTF-8 / chcp 65001 / if(...) CJK echoes
#   - doyoutrade-setup.iss breaks under ISCC /DMyAppVersion=...
name: windows-installer-guard

on:
  pull_request:
    paths:
      - "install.ps1"
      - "install-win.ps1"
      - "安装DoYouTrade.bat"
      - "启动DoYouTrade.bat"
      - "packaging/windows/**"
      - "scripts/write_windows_bats_gbk.py"
      - "tests/test_installer_no_bom.py"
      - "tests/test_install_win_bootstrap.py"
      - "tests/test_windows_launcher_bat.py"
      - "tests/test_windows_installer_hardening.py"
      - "tests/test_install_console_diagnostics.py"
      - "tests/test_windows_installer_force_overwrite.py"
      - ".github/workflows/windows-installer-guard.yml"
      - ".github/workflows/build-windows-installer.yml"
  push:
    branches: [main]
    paths:
      - "install.ps1"
      - "install-win.ps1"
      - "安装DoYouTrade.bat"
      - "启动DoYouTrade.bat"
      - "packaging/windows/**"
      - "scripts/write_windows_bats_gbk.py"
      - "tests/test_installer_no_bom.py"
      - "tests/test_install_win_bootstrap.py"
      - "tests/test_windows_launcher_bat.py"
      - "tests/test_windows_installer_hardening.py"
      - "tests/test_install_console_diagnostics.py"
      - "tests/test_windows_installer_force_overwrite.py"
      - ".github/workflows/windows-installer-guard.yml"
      - ".github/workflows/build-windows-installer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer encoding / launcher regression tests
        shell: bash
        run: |
          python -m unittest \
            tests.test_installer_no_bom \
            tests.test_install_win_bootstrap \
            tests.test_windows_launcher_bat \
            tests.test_windows_installer_hardening \
            tests.test_install_console_diagnostics \
            tests.test_windows_installer_force_overwrite \
            -v

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Dry-compile installer (catch /D vs #define clashes)
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=0.0.0-ci packaging\windows\doyoutrade-setup.iss

      - name: Upload dry-build Setup.exe
        uses: actions/upload-artifact@v7
        with:
          name: DoYouTrade-Setup-ci
          path: packaging/windows/dist/DoYouTrade-Setup.exe
          if-no-files-found: error
