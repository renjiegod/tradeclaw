# 游资席位静态标签库 (hot-money seat tag library)
# ---------------------------------------------------------------------------
# 映射:  游资名 (hot-money handle) -> [营业部名称关键词, ...]
#
# 这是一个**可扩展的起步数据集,非权威**。它只是把几个广为人知的知名游资和
# 其代表性营业部做了粗匹配,用于给 `data lhb --symbol` 的席位明细打一个
# best-effort 的 `hot_money` 标签。匹配方式是**子串匹配**(把每个关键词当作
# 交易营业部名称的子串来判断),因此关键词写得越具体命中越准、越宽泛越容易
# 误伤。命中即打标签;没命中 (hot_money=None) 只代表"不在这份清单里",
# **不代表这不是游资**。
#
# 想扩展?直接在下面加 `游资名: [关键词, ...]` 即可,loader 会即时生效,
# 无需改代码。营业部名称会随券商更名 / 迁址而变,这份清单不保证时效。
# ---------------------------------------------------------------------------

章盟主:
  - "中信证券股份有限公司杭州四季路"
  - "中信证券杭州四季路"
赵老哥:
