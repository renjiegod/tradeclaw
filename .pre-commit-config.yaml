# 安装：uv tool install pre-commit && pre-commit install
# 依赖本机已安装 gitleaks（brew install gitleaks）。
repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (staged secrets scan)
        entry: gitleaks git --staged --pre-commit --redact --no-banner
        language: system
        pass_filenames: false
