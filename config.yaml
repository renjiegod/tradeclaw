# TradeClaw runtime configuration (edit this file; see tradeclaw/default_config.yaml for schema).

server:
  host: "0.0.0.0"
  port: 8000
  tick_seconds: 5.0

data:
  symbols:
    - "600000.SH"
    - "601318.SH"
  qmt:
    base_url: null
    token: null
    session_id: null
    timeout_seconds: 5.0

risk:
  max_single_order_amount: 20000.0
  max_position_ratio: 0.30

approval:
  min_notional_for_approval: 1000.0
  timeout_seconds: 300

model:
  # Local gateway: POST /v1/messages + x-api-key → use anthropic (not openai_compatible).
  provider: "anthropic" # demo | anthropic | openai_compatible
  model: "qwen/qwen3-coder-30b"
  temperature: 0.1
  max_tokens: 100000
  timeout_seconds: 30.0
  anthropic:
    api_key: "${LM_API_TOKEN}"
    base_url: "http://localhost:1234"
  openai_compatible:
    api_key: null
    base_url: null
